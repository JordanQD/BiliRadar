name: Build and Release MSIX

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore workloads
        run: dotnet workload restore

      - name: Set version from tag
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "APP_VERSION=${VERSION}.0" >> $GITHUB_ENV
          else
            echo "APP_VERSION=0.0.0.0" >> $GITHUB_ENV
          fi

      - name: Generate signing certificate
        shell: pwsh
        run: |
          $publisher = "CN=55B82F9D-39B5-4EC7-8696-862731CE35AA"
          $cert = New-SelfSignedCertificate -Type Custom -Subject $publisher -KeyAlgorithm RSA -KeyLength 2048 -KeyUsage DigitalSignature -KeyExportPolicy Exportable -FriendlyName "BiliRadar CI" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $certPassword = ConvertTo-SecureString -String "password" -Force -AsPlainText
          Export-PfxCertificate -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" -FilePath "${{ github.workspace }}\ci-cert.pfx" -Password $certPassword
          "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Write-Host "Certificate generated: $($cert.Subject)  Thumbprint: $($cert.Thumbprint)"

      - name: Build and package x64
        run: >
          dotnet build BiliRadar/BiliRadar.csproj
          -c Release
          -p:Platform=x64
          -p:Version=${{ env.APP_VERSION }}
          -p:AppxBundle=Never
          -p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT
          -p:GenerateAppxPackageOnBuild=true
          -p:UapAppxPackageBuildMode=SideloadOnly
          -p:AppxPackageDir="${{ github.workspace }}\packages\x64\"

      - name: Build and package ARM64
        run: >
          dotnet build BiliRadar/BiliRadar.csproj
          -c Release
          -p:Platform=ARM64
          -p:Version=${{ env.APP_VERSION }}
          -p:AppxBundle=Never
          -p:PackageCertificateThumbprint=$env:CERT_THUMBPRINT
          -p:GenerateAppxPackageOnBuild=true
          -p:UapAppxPackageBuildMode=SideloadOnly
          -p:AppxPackageDir="${{ github.workspace }}\packages\arm64\"

      - name: Create AppxBundle
        shell: pwsh
        run: |
          $x64Msix = Get-ChildItem -Path "packages/x64" -Recurse -Filter "*.msix" | Select-Object -First 1
          $arm64Msix = Get-ChildItem -Path "packages/arm64" -Recurse -Filter "*.msix" | Select-Object -First 1

          if (-not $x64Msix -or -not $arm64Msix) {
            Write-Host "=== All files under packages/ ==="
            Get-ChildItem -Path packages -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
            Write-Error "MSIX not found. x64: $x64Msix, ARM64: $arm64Msix"
            exit 1
          }

          Write-Host "x64 MSIX:  $($x64Msix.FullName)"
          Write-Host "ARM64 MSIX: $($arm64Msix.FullName)"

          New-Item -ItemType Directory -Force -Path bundle-input | Out-Null
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $x64Msix.FullName bundle-input/
          Copy-Item $arm64Msix.FullName bundle-input/

          $windowsKitsBin = "${env:ProgramFiles(x86)}\Windows Kits\10\bin"
          $makeappx = Get-ChildItem -Path $windowsKitsBin -Recurse -Filter makeappx.exe |
            Where-Object { $_.FullName -match '\\x64\\makeappx\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          $signtool = Get-ChildItem -Path $windowsKitsBin -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $makeappx -or -not $signtool) {
            Write-Host "=== Windows SDK tools under $windowsKitsBin ==="
            Get-ChildItem -Path $windowsKitsBin -Recurse -Include makeappx.exe,signtool.exe -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "  $($_.FullName)" }
            Write-Error "Required Windows SDK tools were not found. makeappx: $makeappx, signtool: $signtool"
            exit 1
          }

          Write-Host "makeappx: $($makeappx.FullName)"
          Write-Host "signtool: $($signtool.FullName)"
          & $($makeappx.FullName) bundle /d bundle-input /p artifacts/BiliRadar.msixbundle
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $($signtool.FullName) sign /fd SHA256 /f "${{ github.workspace }}\ci-cert.pfx" /p password artifacts/BiliRadar.msixbundle
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "Bundle created:"
          Get-ChildItem artifacts/

      - name: Export certificate
        shell: pwsh
        run: |
          $cerBytes = [System.IO.File]::ReadAllBytes("${{ github.workspace }}\ci-cert.pfx")
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2($cerBytes, "password")
          $cerBytes = $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          [System.IO.File]::WriteAllBytes("artifacts/BiliRadar_Certificate.cer", $cerBytes)
          Write-Host "Certificate exported: $($cert.Subject)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiliRadar-Release
          path: artifacts/*

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: BiliRadar-Release
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
